<div class="game-container" [class.loading]="isLoading">
    <!-- HEADER -->
    <div class="game-header">
        <button routerLink="/ytidle" class="back-btn">← HUB</button>
        <div class="header-right-group">
            <h1 class="title">EMOTE <span>DECODER</span></h1>
            <div class="stats-pill">
                <span class="label">ODKRYTE:</span>
                <span class="value">{{ visibleEmojisCount }}/5</span>
            </div>
        </div>
    </div>

    <!-- MAIN GAME AREA -->
    <div class="main-game" *ngIf="!isLoading">
        
        <!-- EMOJI BUBBLES AREA -->
        <div class="emoji-canvas">
            <div class="emoji-grid">
                <div *ngFor="let emoji of visibleEmojis; let i = index" 
                     class="emoji-bubble"
                     [style.animation-delay]="(i * 0.1) + 's'">
                    {{ emoji }}
                </div>
                <!-- EMPTY SLOTS -->
                <div *ngFor="let empty of [].constructor(5 - visibleEmojisCount)" class="emoji-slot">
                    ?
                </div>
            </div>
            <p class="canvas-hint" *ngIf="!hasWon">Odszyfruj twórcę używając powyższych emotek</p>
        </div>

        <!-- INPUT SECTION -->
        <div class="input-area" *ngIf="!hasWon">
            <div class="input-wrapper" [class.error]="guessError">
                <select [(ngModel)]="selectedYoutuberId" (change)="guessError = false" class="styled-select">
                    <option value="" disabled selected>Kto to może być?</option>
                    <option *ngFor="let yt of youtubers" [value]="yt.id">
                        {{ yt.name }}
                    </option>
                </select>
                <button (click)="guess()" [disabled]="!selectedYoutuberId" class="decode-btn">
                    DEKODUJ
                </button>
            </div>
            <div class="error-msg" *ngIf="guessError">
                NIEPOPRAWNY KOD. DODANO NOWĄ PODPOWIEDŹ.
            </div>
        </div>

        <!-- WIN STATE -->
        <div class="win-card" *ngIf="hasWon">
            <div class="celebration-glow"></div>
            <div class="win-content">
                <div class="badge">SYSTEM ODSZYFROWANY</div>
                <div class="avatar-box">
                    <img [src]="target.avatarUrl" alt="winner" class="winner-avatar">
                </div>
                <h2>{{ target.name }}</h2>
                <div class="win-actions">
                    <button (click)="setupNewTarget()" class="play-again-btn">NOWA GRA</button>
                    <button routerLink="/ytidle" class="exit-btn">WYJŚCIE</button>
                </div>
            </div>
        </div>

    </div>

    <!-- LOADING -->
    <div class="loading-overlay" *ngIf="isLoading">
        <div class="decoder-ring"></div>
        <p>Analizowanie kanału...</p>
    </div>
</div>
