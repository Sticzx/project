<div class="game-container" [class.loading]="isLoading">
    <!-- HEADER (Ultra Compact) -->
    <div class="game-header">
        <button routerLink="/ytidle" class="back-btn">← HUB</button>
        <div class="header-right-group">
            <h1 class="title">THUMBNAIL <span>DECRYPTOR</span></h1>
            <div class="stats-pill">
                <span class="label">BŁĘDY:</span>
                <span class="value">{{ wrongGuessesCount }}</span>
            </div>
        </div>
    </div>

    <!-- MAIN GAME -->
    <div class="main-game" *ngIf="!isLoading && targetCreator">
        <div class="game-grid">
            
            <!-- LEFT: THE DECRYPTOR -->
            <div class="decryptor-side">
                <div class="decryptor-box" [class.won]="hasWon">
                    <div class="scan-line" *ngIf="!hasWon"></div>
                    <div class="image-wrapper">
                        <img [src]="targetVideo.snippet.thumbnails.high.url" 
                             [style.filter]="'blur(' + currentBlur + 'px)'"
                             alt="target thumbnail" 
                             class="target-img">
                        <div class="overlay" *ngIf="!hasWon">
                            <div class="blur-indicator">{{ currentBlur }}px</div>
                        </div>
                    </div>

                    <div class="decrypt-footer" *ngIf="!hasWon">
                        <div class="progress-bar">
                            <div class="fill" [style.width]="((wrongGuessesCount * 25) > 100 ? 100 : (wrongGuessesCount * 25)) + '%'"></div>
                        </div>
                        <span class="status-text">DECRYPTING... {{ (wrongGuessesCount * 25) > 100 ? 100 : (wrongGuessesCount * 25) }}%</span>
                    </div>

                    <div class="match-found" *ngIf="hasWon">
                        <div class="match-header">
                            <div class="badge">DOPASOWANO!</div>
                            <button (click)="setupGame()" class="next-btn-small">NASTĘPNY</button>
                        </div>
                        <h3>{{ decodeHtml(targetVideo.snippet.title) }}</h3>
                    </div>
                </div>
            </div>

            <!-- RIGHT: GUESS LIST -->
            <div class="titles-side" *ngIf="!hasWon">
                <div class="titles-scroll-area">
                    <div class="titles-grid">
                        <div class="title-card" 
                             *ngFor="let v of videos" 
                             (click)="selectedVideoId = v.id.videoId; guess()">
                            <p>{{ decodeHtml(v.snippet.title) }}</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- LOADING -->
    <div class="loading-overlay" *ngIf="isLoading">
        <div class="loader"></div>
    </div>
</div>
