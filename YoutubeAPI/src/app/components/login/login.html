<div class="login-wrapper">
  <div class="login-card">
    <div class="logo-container">
      <svg viewBox="0 0 24 24" class="yt-logo" fill="currentColor">
        <path d="M21.582 6.186a2.665 2.665 0 0 0-1.874-1.874C18.053 3.863 12 3.863 12 3.863s-6.053 0-7.708.449a2.665 2.665 0 0 0-1.874 1.874C1.969 7.841 1.969 12 1.969 12s0 4.159.449 5.814a2.665 2.665 0 0 0 1.874 1.874c1.655.449 7.708.449 7.708.449s6.053 0 7.708-.449a2.665 2.665 0 0 0 1.874-1.874C22.031 16.159 22.031 12 22.031 12s0-4.159-.449-5.814zM9.994 15.011V8.989L15.26 12l-5.266 3.011z"/>
      </svg>
      <h1>Sign in</h1>
      <p>to continue to LoldleYT</p>
    </div>

    <form class="login-form">
      <div class="input-group">
        <input type="text" id="username" required>
        <label for="username">Email or username</label>
      </div>
      
      <div class="input-group">
        <input type="password" id="password" required>
        <label for="password">Password</label>
      </div>

      <div class="form-actions">
        <a href="javascript:void(0)" class="forgot-link">Forgot password?</a>
        <button type="button" class="submit-btn" routerLink="">Sign in</button>
      </div>
    </form>
    
    <div class="card-footer">
      <span>Not your computer? Use Guest mode to sign in privately.</span>
      <a href="javascript:void(0)">Create account</a>
    </div>
  </div>
</div>
