<div class="ytdle-hub">
    <div class="hub-header">
        <button routerLink="/home" class="exit-hub">← MENU GŁÓWNE</button>
        <h1 class="hub-title">YTDLE <span>HUB</span></h1>
        <p class="hub-subtitle">Wybierz tryb wyzwania i sprawdź swoją wiedzę o YouTube</p>
    </div>

    <div class="modes-container">
        <!-- MODE: SUBSCRIBED -->
        <div class="mode-card subscribed" routerLink="/subscribed">
            <div class="card-bg"></div>
            <div class="card-content">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.7 12.4c-.2-.1-.4-.1-.6 0l-7 4c-.2.1-.3.3-.3.5v-8c0-.2.1-.4.3-.5l7 4c.2.1.4.1.6 0l.1-.1c.3-.3.3-.7 0-1l-7-4c-.5-.3-1.1-.3-1.6 0L3.1 7.4C2.4 7.8 2 8.6 2 9.4v5.2c0 .8.4 1.6 1.1 2l7 4c.5.3 1.1.3 1.6 0l7.1-4c.7-.4 1.1-1.2 1.1-2V9.4c0-.8-.4-1.6-1.1-2l-.1-.1c-.3-.2-.7-.2-1 .1z"/>
                    </svg>
                </div>
                <h2>SUBSCRIBED</h2>
                <p>Zgadnij twórcę po jego liczbie subskrypcji i statystykach.</p>
                <div class="difficulty easy">ŁATWY</div>
                <button class="play-btn">GRAJ TERAZ</button>
            </div>
        </div>

        <!-- MODE: THUMBNAILS -->
        <div class="mode-card thumbnails" routerLink="/thumbnails">
            <div class="card-bg"></div>
            <div class="card-content">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 16H6c-.55 0-1-.45-1-1V7c0-.55.45-1 1-1h12c.55 0 1 .45 1 1v11c0 .55-.45 1-1 1zm-4.5-9L11 14l-2.5-3L5 17h14l-4.5-7z"/>
                    </svg>
                </div>
                <h2>THUMBNAIL</h2>
                <p>Rozpoznaj YouTubera po ocenzurowanych miniaturach filmów.</p>
                <div class="difficulty medium">ŚREDNI</div>
                <button class="play-btn">GRAJ TERAZ</button>
            </div>
        </div>

        <!-- MODE: EMOTES -->
        <div class="mode-card emotes" routerLink="/emotes">
            <div class="card-bg"></div>
            <div class="card-content">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
                    </svg>
                </div>
                <h2>EMOTES</h2>
                <p>Czy potrafisz zgadnąć twórcę używając tylko zestawu emotek?</p>
                <div class="difficulty hard">TRUDNY</div>
                <button class="play-btn">GRAJ TERAZ</button>
            </div>
        </div>
    </div>
</div>
